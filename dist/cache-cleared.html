<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmLoca - Cache Cleared</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .success {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .info {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .reload {
            display: inline-block;
            padding: 15px 30px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .reload:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✅ Cache Cleared!</div>
        <div class="info">
            FilmLoca files have been updated.<br>
            Please wait 2-3 minutes for full deployment.<br>
            Then refresh this page.
        </div>
        <a href="https://filmloca.com" class="reload">🚀 Go to FilmLoca</a>
    </div>
</body>
</html>
