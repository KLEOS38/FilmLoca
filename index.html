    <!-- CRITICAL: Blocking script that runs BEFORE React -->
    <script>
      // CRITICAL: Prevent scroll restoration FIRST, before anything else
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      
      // CRITICAL: Force scroll to top IMMEDIATELY, synchronously - BEFORE React loads
      (function() {
        var forceScroll = function() {
          window.scrollTo(0, 0);
          if (document.documentElement) {
            document.documentElement.scrollTop = 0;
          }
          if (document.body) {
            document.body.scrollTop = 0;
          }
        };
        
        forceScroll();
        
        // Also set scroll position on documentElement and body
        if (document.documentElement) {
          document.documentElement.style.scrollBehavior = 'auto';
        }
        if (document.body) {
          document.body.style.scrollBehavior = 'auto';
        }
        
        // Watch for scroll restoration attempts during initial load
        var scrollWatcher = setInterval(function() {
          var currentScroll = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
          if (currentScroll > 0) {
            forceScroll();
          }
        }, 10);
        
        // Stop watching after 2 seconds to allow normal scrolling
        setTimeout(function() {
          clearInterval(scrollWatcher);
        }, 2000);
        
        // Also check after window load (browser might restore scroll here)
        window.addEventListener('load', function() {
          setTimeout(function() {
            var currentScroll = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
            if (currentScroll > 0) {
              forceScroll();
            }
          }, 0);
          setTimeout(function() {
            var currentScroll = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
            if (currentScroll > 0) {
              forceScroll();
            }
          }, 100);
        }, { once: true });
      })();
    </script>

    <script>
      // Additional scroll prevention after React loads
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      
      // Force scroll to top IMMEDIATELY, synchronously
      window.scrollTo(0, 0);
      if (document.documentElement) {
        document.documentElement.scrollTop = 0;
      }
      if (document.body) {
        document.body.scrollTop = 0;
      }
      
      // Prevent any scroll restoration attempts
      window.addEventListener('beforeunload', () => {
        window.scrollTo(0, 0);
        if ('scrollRestoration' in history) {
          history.scrollRestoration = 'manual';
        }
      });
      
      // Force scroll to top on every possible event
      const forceScrollTop = () => {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      };
      
      // Multiple event listeners to catch all scenarios
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', forceScrollTop, { once: true });
      } else {
        forceScrollTop();
      }
      
      window.addEventListener('load', forceScrollTop, { once: true });
      
      // Also force on next tick
      setTimeout(forceScrollTop, 0);
      setTimeout(forceScrollTop, 10);
      setTimeout(forceScrollTop, 50);
    </script>
    <script>
      // Register service worker for PWA functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {

      // Add to Home Screen prompt handler
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later
        deferredPrompt = e;
        // Update UI to notify the user they can install the PWA
        // You can add your custom UI logic here
      });
      
      // Function to show the install prompt (call this from a button click)
      function showInstallPrompt() {
        if (deferredPrompt) {
          // Show the install prompt
          deferredPrompt.prompt();
          // Wait for the user to respond to the prompt
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt');
            } else {
              console.log('User dismissed the install prompt');
            }
            // Clear the saved prompt since it can't be used again
            deferredPrompt = null;
          });
        }
      }
